  <body><p id="filepos1406629" class="calibre_20"><a href="index_split_101.html#filepos1393653"><span class="calibre4">[1]</span></a><span class="calibre4">起承转合：诗文的章法结构术语。起，开端。承，承接上文并申述。转，转折。合，全文结语。</span></p><p id="filepos1406873" class="calibre_20"><a href="index_split_101.html#filepos1394042"><span class="calibre4">[2]</span></a><span class="calibre4">一三五不论，二四六分明：律诗对平仄的基本规定，每句的第一、三、五个字要求得较宽，可以不论；第二、四、六字则要求较严，平仄必须依律。</span></p><p id="filepos1407186" class="calibre_20"><a href="index_split_101.html#filepos1403701"><span class="calibre4">[3]</span></a><span class="calibre4">两眼鳏（guān）鳏：眼睛睁着，形容忧愁失眠的样子。</span></p><div class="mbp_pagebreak" id="calibre_pb_102"/>
