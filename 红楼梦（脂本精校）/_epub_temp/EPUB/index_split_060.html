  <body><p id="filepos830001" class="calibre_20"><a href="index_split_059.html#filepos806633"><span class="calibre4">[1]</span></a><span class="calibre4">文章：华美的色彩或花纹，此处指室内铺设的各色织品。</span></p><p id="filepos830194" class="calibre_20"><a href="index_split_059.html#filepos812371"><span class="calibre4">[2]</span></a><span class="calibre4">每日家情思睡昏昏 ：《西厢记》中崔莺莺的唱词，描写崔莺莺思念张生的心绪。</span></p><p id="filepos830418" class="calibre_20"><a href="index_split_059.html#filepos813924"><span class="calibre4">[3]</span></a><span class="calibre4">“若共你”二句：此二句为《西厢记》中张生的唱词。大意为，若能因你的功劳而和你的小姐同床共枕，又怎舍得让你去做铺床叠被这种差事。</span></p><p id="filepos830725" class="calibre_20"><a href="index_split_059.html#filepos818866"><span class="calibre4">[4]</span></a><span class="calibre4">打围：打猎、围猎。</span></p><p id="filepos830870" class="calibre_20"><a href="index_split_059.html#filepos818967"><span class="calibre4">[5]</span></a><span class="calibre4">兔鹘（gǔ）：猎鹰的一种。</span></p><div class="mbp_pagebreak" id="calibre_pb_60"/>
