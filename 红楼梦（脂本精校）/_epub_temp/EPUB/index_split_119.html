  <body><p id="filepos1688180" class="calibre_20"><a href="index_split_118.html#filepos1664889"><span class="calibre4">[1]</span></a><span class="calibre4">揆（kuí）：揣测。</span></p><p id="filepos1688323" class="calibre_20"><a href="index_split_118.html#filepos1665234"><span class="calibre4">[2]</span></a><span class="calibre4">薨（hōng）：古制天子死曰崩，诸侯死曰薨。后来皇妃、大臣、诸王等死也叫薨。</span></p><p id="filepos1688548" class="calibre_20"><a href="index_split_118.html#filepos1667292"><span class="calibre4">[3]</span></a><span class="calibre4">跴踏：实地察看。</span></p><p id="filepos1688690" class="calibre_20"><a href="index_split_118.html#filepos1670336"><span class="calibre4">[4]</span></a><span class="calibre4">比丘尼：尼姑。比丘为和尚。</span></p><p id="filepos1688847" class="calibre_20"><a href="index_split_118.html#filepos1673560"><span class="calibre4">[5]</span></a><span class="calibre4">公冶长：孔子弟子，传说能通鸟语。</span></p><p id="filepos1689013" class="calibre_20"><a href="index_split_118.html#filepos1674705"><span class="calibre4">[6]</span></a><span class="calibre4">尺寸地方儿：指讲究规矩的地方。</span></p><p id="filepos1689176" class="calibre_20"><a href="index_split_118.html#filepos1685418"><span class="calibre4">[7]</span></a><span class="calibre4">菂（dì）：莲子，与藕同体，藕为莲根。</span></p><div class="mbp_pagebreak" id="calibre_pb_119"/>
