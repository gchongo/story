  <body><p id="filepos239153" class="calibre_20"><a href="index_split_017.html#filepos215886"><span class="calibre4">[1]</span></a><span class="calibre4">连宗：旧时候，同姓而没有宗族关系的人认作本家，叫作“连宗”，也作“联宗”。</span></p><p id="filepos239382" class="calibre_20"><a href="index_split_017.html#filepos218308"><span class="calibre4">[2]</span></a><span class="calibre4">【彳貞】（chēng）：意接近“蹭”，胆怯慢行。</span></p><p id="filepos239563" class="calibre_20"><a href="index_split_017.html#filepos223348"><span class="calibre4">[3]</span></a><span class="calibre4">逶迤（wēi yí）：蜿蜒曲折。此处意为曲折行进，拐来拐去。</span></p><p id="filepos239761" class="calibre_20"><a href="index_split_017.html#filepos223671"><span class="calibre4">[4]</span></a><span class="calibre4">通房大丫头：古代贵族男子收纳贴身婢女为妾，此称作“通房丫头”，其地位低于姨娘。</span></p><div class="mbp_pagebreak" id="calibre_pb_18"/>
