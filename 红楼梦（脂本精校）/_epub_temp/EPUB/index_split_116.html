  <body><p id="filepos1627978" class="calibre_20"><a href="index_split_115.html#filepos1600514"><span class="calibre4">[1]</span></a><span class="calibre4">内壸（kǔn）：内室。</span></p><p id="filepos1628124" class="calibre_20"><a href="index_split_115.html#filepos1603528"><span class="calibre4">[2]</span></a><span class="calibre4">《不自弃文》：见南宋朱熹《朱子文集大全类编》卷二十一“庭训”。大意为天下万物都有可取之处，都是有用的，勉励人不要自暴自弃。</span></p><p id="filepos1628425" class="calibre_20"><a href="index_split_115.html#filepos1608133"><span class="calibre4">[3]</span></a><span class="calibre4">蛊（gǔ）：毒虫，形容人居心歹毒。</span></p><p id="filepos1628591" class="calibre_20"><a href="index_split_115.html#filepos1609467"><span class="calibre4">[4]</span></a><span class="calibre4">幸于始者怠于终，缮其辞者嗜其利：大意为，得到机会太容易到最后反而会懈怠，花言巧语的人往往是因为贪图其利益。</span></p><div class="mbp_pagebreak" id="calibre_pb_116"/>
