  <body><p id="filepos857407" class="calibre_20"><a href="index_split_061.html#filepos831204"><span class="calibre4">[1]</span></a><span class="calibre4">杨妃、飞燕：古代著名美人杨贵妃（杨玉环）、赵飞燕，有“环肥燕瘦”之称。</span></p><p id="filepos857630" class="calibre_20"><a href="index_split_061.html#filepos832725"><span class="calibre4">[2]</span></a><span class="calibre4">干旄（máo）旌 （jīng）幢：古代的仪仗用具。干旄，用牦牛尾作装饰的旗杆。旌，似牦，另有彩羽为饰。幢，形状像伞。</span></p><p id="filepos857908" class="calibre_20"><a href="index_split_061.html#filepos839809"><span class="calibre4">[3]</span></a><span class="calibre4">爖（ lóng）：生火。</span></p><p id="filepos858053" class="calibre_20"><a href="index_split_061.html#filepos845299"><span class="calibre4">[4]</span></a><span class="calibre4">狮子：指压帘用的小石狮子。</span></p><p id="filepos858210" class="calibre_20"><a href="index_split_061.html#filepos853024"><span class="calibre4">[5]</span></a><span class="calibre4">一抔（póu）：一捧。</span></p><div class="mbp_pagebreak" id="calibre_pb_62"/>
