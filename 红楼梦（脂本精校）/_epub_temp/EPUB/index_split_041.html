  <body><p id="filepos536979" class="calibre_20"><a href="index_split_040.html#filepos504054"><span class="calibre4">[1]</span></a><span class="calibre4">吊纸：即吊丧。旧时吊丧须带纸钱，故称“吊纸”。</span></p><p id="filepos537166" class="calibre_20"><a href="index_split_040.html#filepos505571"><span class="calibre4">[2]</span></a><span class="calibre4">妥协：恰当、合适。</span></p><p id="filepos537311" class="calibre_20"><a href="index_split_040.html#filepos507516"><span class="calibre4">[3]</span></a><span class="calibre4">崚嶒（líng céng）：高耸突兀。</span></p><p id="filepos537470" class="calibre_20"><a href="index_split_040.html#filepos509318"><span class="calibre4">[4]</span></a><span class="calibre4">雕甍（méng）：雕镂文采的殿亭屋脊。</span></p><p id="filepos537638" class="calibre_20"><a href="index_split_040.html#filepos509422"><span class="calibre4">[5]</span></a><span class="calibre4">树杪（miǎo）：树梢。</span></p><p id="filepos537785" class="calibre_20"><a href="index_split_040.html#filepos509598"><span class="calibre4">[6]</span></a><span class="calibre4">石桥三港（hóng）：三孔石桥。港，即通水的孔洞。</span></p><p id="filepos537971" class="calibre_20"><a href="index_split_040.html#filepos515765"><span class="calibre4">[7]</span></a><span class="calibre4">范石湖田家之咏：范石湖即宋代诗人范成大，自号“石湖”，擅长描写田园生活景象。</span></p><p id="filepos538203" class="calibre_20"><a href="index_split_040.html#filepos517388"><span class="calibre4">[8]</span></a><span class="calibre4">茆（máo）堂：茅草盖的房舍。“茆”，同“茅”。</span></p><p id="filepos538388" class="calibre_20"><a href="index_split_040.html#filepos528152"><span class="calibre4">[9]</span></a><span class="calibre4">博古：用古器物图形装饰的工艺品。</span></p><p id="filepos538554" class="calibre_20"><a href="index_split_040.html#filepos528235"><span class="calibre4">[10]</span></a><span class="calibre4">即万福万寿。</span></p><div class="mbp_pagebreak" id="calibre_pb_41"/>
