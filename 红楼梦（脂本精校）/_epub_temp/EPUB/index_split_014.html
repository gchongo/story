  <body><p id="filepos166505" class="calibre_20"><a href="index_split_013.html#filepos142299"><span class="calibre4">[1]</span></a><span class="calibre4">国子监祭酒：国家最高学府的主管官。</span></p><p id="filepos166674" class="calibre_20"><a href="index_split_013.html#filepos142849"><span class="calibre4">[2]</span></a><span class="calibre4">纺绩井臼（jiù）：代指家务事。纺，织布。绩，把麻搓成绳、线。井，打水。臼，舂米。</span></p><p id="filepos166910" class="calibre_20"><a href="index_split_013.html#filepos143130"><span class="calibre4">[3]</span></a><span class="calibre4">针黹（zhǐ）：也作“针指”，针线活。黹，缝纫、刺绣。</span></p><p id="filepos167104" class="calibre_20"><a href="index_split_013.html#filepos144368"><span class="calibre4">[4]</span></a><span class="calibre4">海捕文书：古代官府通令各地抓捕逃犯的文书。</span></p><p id="filepos167285" class="calibre_20"><a href="index_split_013.html#filepos145084"><span class="calibre4">[5]</span></a><span class="calibre4">沙弥：刚出家受了十戒的小和尚，一般在二十岁以下。</span></p><p id="filepos167475" class="calibre_20"><a href="index_split_013.html#filepos150738"><span class="calibre4">[6]</span></a><span class="calibre4">胭脂㾵（jì）：鲜红色的胎记。</span></p><p id="filepos167635" class="calibre_20"><a href="index_split_013.html#filepos151532"><span class="calibre4">[7]</span></a><span class="calibre4">堂客：旧称妇女为堂客，男子为官客。</span></p><p id="filepos167804" class="calibre_20"><a href="index_split_013.html#filepos154071"><span class="calibre4">[8]</span></a><span class="calibre4">扶鸾：也叫“扶乩（jī）”，一种占卜活动。</span></p><p id="filepos167982" class="calibre_20"><a href="index_split_013.html#filepos156309"><span class="calibre4">[9]</span></a><span class="calibre4">内帑（tǎng）：皇宫内府库的钱粮财货。</span></p><p id="filepos168153" class="calibre_20"><a href="index_split_013.html#filepos160765"><span class="calibre4">[10]</span></a><span class="calibre4">春秋：年纪、年龄。</span></p><div class="mbp_pagebreak" id="calibre_pb_14"/>
