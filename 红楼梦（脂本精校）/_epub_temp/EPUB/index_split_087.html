  <body><p id="filepos1224625" class="calibre_20"><a href="index_split_086.html#filepos1204716"><span class="calibre4">[1]</span></a><span class="calibre4">搛（jiān）：用筷子夹菜。</span></p><p id="filepos1224778" class="calibre_20"><a href="index_split_086.html#filepos1204901"><span class="calibre4">[2]</span></a><span class="calibre4">茄鲞（xiǎng）：腌腊茄子。鲞即腊干鱼。</span></p><p id="filepos1224950" class="calibre_20"><a href="index_split_086.html#filepos1205751"><span class="calibre4">[3]</span></a><img src="images/00002.jpg" class="calibre_47"/><span class="calibre4">（qiān）：切，割。</span></p><p id="filepos1225162" class="calibre_20"><a href="index_split_086.html#filepos1206104"><span class="calibre4">[4]</span></a><span class="calibre4">鸡瓜：掰下来瓜子大小的鸡大腿肉粒。</span></p><p id="filepos1225331" class="calibre_20"><a href="index_split_086.html#filepos1209439"><span class="calibre4">[5]</span></a><span class="calibre4">黑老鸹（guā）子：乌鸦。本指八哥，此处刘姥姥误认为乌鸦。</span></p><p id="filepos1225531" class="calibre_20"><a href="index_split_086.html#filepos1212446"><span class="calibre4">[6]</span></a><span class="calibre4">蠲 ：此处意同“涓”，收集使之清洁。</span></p><p id="filepos1225701" class="calibre_20"><a href="index_split_086.html#filepos1213195"><span class="calibre4">[7]</span></a><span class="calibre4">飺（cí）：此处意同“蹭”。</span></p><p id="filepos1225858" class="calibre_20"><a href="index_split_086.html#filepos1213652"><span class="calibre4">[8]</span></a><span class="calibre4">【分瓜】瓟斝（bān páo jiǎ）：用葫芦做的斝状的饮器。“【分瓜】”和“瓟”都是葫芦属。</span></p><p id="filepos1226098" class="calibre_20"><a href="index_split_086.html#filepos1213978"><span class="calibre4">[9]</span></a><span class="calibre4">杏犀䀉（qiáo）：犀牛角做成的饮器。“䀉”为碗类器皿。</span></p><p id="filepos1226293" class="calibre_20"><a href="index_split_086.html#filepos1215618"><span class="calibre4">[10]</span></a><span class="calibre4">鬼脸青：一种深蓝绿色釉的瓷器。</span></p><p id="filepos1226457" class="calibre_20"><a href="index_split_086.html#filepos1221310"><span class="calibre4">[11]</span></a><span class="calibre4">消息：具有可以开合机制的装置。</span></p><div class="mbp_pagebreak" id="calibre_pb_87"/>
