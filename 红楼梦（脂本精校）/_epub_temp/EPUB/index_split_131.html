  <body><p id="filepos1860517" class="calibre_20"><a href="index_split_130.html#filepos1830147"><span class="calibre4">[1]</span></a><span class="calibre4">藉草枕块：睡干草，枕土块。古时居父母丧的一种礼节。</span></p><p id="filepos1860710" class="calibre_20"><a href="index_split_130.html#filepos1835102"><span class="calibre4">[2]</span></a><span class="calibre4">鼒（zī）：小鼎。</span></p><p id="filepos1860852" class="calibre_20"><a href="index_split_130.html#filepos1836064"><span class="calibre4">[3]</span></a><span class="calibre4">春秋荐其时食：意为每逢春秋祭祀，向祖先进献时鲜食品。</span></p><p id="filepos1861048" class="calibre_20"><a href="index_split_130.html#filepos1843153"><span class="calibre4">[4]</span></a><span class="calibre4">第二义：第二等，第二流。</span></p><p id="filepos1861202" class="calibre_20"><a href="index_split_130.html#filepos1843494"><span class="calibre4">[5]</span></a><span class="calibre4">王荆公、永叔：王荆公即王安石。永叔即欧阳修。</span></p><p id="filepos1861386" class="calibre_20"><a href="index_split_130.html#filepos1846304"><span class="calibre4">[6]</span></a><span class="calibre4">聚麀（yōu）：指父子共同占有一个女子的乱伦行为。麀，雌鹿。</span></p><div class="mbp_pagebreak" id="calibre_pb_131"/>
