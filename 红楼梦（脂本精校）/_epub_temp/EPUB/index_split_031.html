  <body><p id="filepos416703" class="calibre_20"><a href="index_split_030.html#filepos394298"><span class="calibre4">[1]</span></a><span class="calibre4">祖茔（yíng）：祖坟。</span></p><p id="filepos416850" class="calibre_20"><a href="index_split_030.html#filepos396748"><span class="calibre4">[2]</span></a><span class="calibre4">搊（chōu）扶：搀扶。</span></p><p id="filepos416997" class="calibre_20"><a href="index_split_030.html#filepos399161"><span class="calibre4">[3]</span></a><span class="calibre4">打醮：道士设坛做法事，求福禳灾的一种法事活动。</span></p><p id="filepos417184" class="calibre_20"><a href="index_split_030.html#filepos399340"><span class="calibre4">[4]</span></a><span class="calibre4">按七做好事：旧俗中亲人为逝者超度灵魂，请僧道按期诵经拜忏，自逝者气绝之日起，每七日为一期，最长七期。</span></p><p id="filepos417452" class="calibre_20"><a href="index_split_030.html#filepos401730"><span class="calibre4">[5]</span></a><span class="calibre4">黉（hóng）门监：即国子监生员。明清时期，凡有资格在国子监读书者均称“监生”。</span></p><p id="filepos417683" class="calibre_20"><a href="index_split_030.html#filepos405224"><span class="calibre4">[6]</span></a><span class="calibre4">冢（zhǒng）孙妇：长孙媳妇。</span></p><p id="filepos417840" class="calibre_20"><a href="index_split_030.html#filepos405919"><span class="calibre4">[7]</span></a><span class="calibre4">诰命：指受过朝廷诰命封赠的贵妇。</span></p><p id="filepos418006" class="calibre_20"><a href="index_split_030.html#filepos409490"><span class="calibre4">[8]</span></a><span class="calibre4">对牌：又称“对号牌”，支领财务的凭证。</span></p><p id="filepos418181" class="calibre_20"><a href="index_split_030.html#filepos411007"><span class="calibre4">[9]</span></a><span class="calibre4">钤（qián）束：约束、管束。</span></p><div class="mbp_pagebreak" id="calibre_pb_31"/>
