  <body><p id="filepos390331" class="calibre_20"><a href="index_split_028.html#filepos374439"><span class="calibre4">[1]</span></a><span class="calibre4">纶（lún）音：指不得不服从的话。纶音，皇帝的话、圣旨。</span></p><p id="filepos390528" class="calibre_20"><a href="index_split_028.html#filepos374841"><span class="calibre4">[2]</span></a><span class="calibre4">起了更：旧时指第一次打更，即五更中的一更天，晚上七点。</span></p><p id="filepos390727" class="calibre_20"><a href="index_split_028.html#filepos381315"><span class="calibre4">[3]</span></a><span class="calibre4">指头告了消乏：指手淫。</span></p><p id="filepos390878" class="calibre_20"><a href="index_split_028.html#filepos386238"><span class="calibre4">[4]</span></a><span class="calibre4">起经：旧时丧俗，人死后，第三天请和尚道士诵经，超度亡灵，叫“起经”。下文“发引”指出殡时，送葬者拿着牵引灵柩的绳索为前导。</span></p><p id="filepos391179" class="calibre_20"><a href="index_split_028.html#filepos387181"><span class="calibre4">[5]</span></a><span class="calibre4">土仪：用来作礼物的土特产。</span></p><p id="filepos391336" class="calibre_20"><a href="index_split_028.html#filepos390004"><span class="calibre4">[6]</span></a><span class="calibre4">铁门限：语出宋范成大诗“纵有千年铁门限，终须一个土馒头”。</span></p><div class="mbp_pagebreak" id="calibre_pb_29"/>
