  <body><p id="filepos331669" class="calibre_20"><a href="index_split_023.html#filepos314763"><span class="calibre4">[1]</span></a><span class="calibre4">呦呦鹿鸣，荷叶浮萍：《诗经》原文为“呦呦鹿鸣，食野之苹。”</span></p><p id="filepos331874" class="calibre_20"><a href="index_split_023.html#filepos316070"><span class="calibre4">[2]</span></a><span class="calibre4">蟾宫折桂：指科举及第。</span></p><p id="filepos332025" class="calibre_20"><a href="index_split_023.html#filepos316240"><span class="calibre4">[3]</span></a><span class="calibre4">和（huó）：搅拌揉捏粉状物使之粘在一起。</span></p><p id="filepos332201" class="calibre_20"><a href="index_split_023.html#filepos318129"><span class="calibre4">[4]</span></a><span class="calibre4">诟谇谣诼（ɡòu suì yáo zhuó）：诟谇，辱骂。谣诼，造谣毁谤。</span></p><p id="filepos332403" class="calibre_20"><a href="index_split_023.html#filepos318468"><span class="calibre4">[5]</span></a><span class="calibre4">龙阳之兴：指喜好男色。下文“契弟”指男同性恋对象。</span></p><p id="filepos332596" class="calibre_20"><a href="index_split_023.html#filepos319140"><span class="calibre4">[6]</span></a><span class="calibre4">将不利于孺子：语出周公辅成王故事。意指有人要欺辱香怜、玉爱。</span></p><p id="filepos332804" class="calibre_20"><a href="index_split_023.html#filepos320916"><span class="calibre4">[7]</span></a><span class="calibre4">贴的好烧饼：指男性之间性交。</span></p><p id="filepos332964" class="calibre_20"><a href="index_split_023.html#filepos326787"><span class="calibre4">[8]</span></a><span class="calibre4">太平拳：别人打架时，在旁趁机打几下冷拳，因不易被人发觉，比较安全，故称“太平拳”。</span></p><p id="filepos333205" class="calibre_20"><a href="index_split_023.html#filepos329027"><span class="calibre4">[9]</span></a><span class="calibre4">借当头：借别人的衣物去典当，换钱花，有钱的时候再赎出归还原主。当头，旧时向当铺做抵押的东西。</span></p><div class="mbp_pagebreak" id="calibre_pb_24"/>
