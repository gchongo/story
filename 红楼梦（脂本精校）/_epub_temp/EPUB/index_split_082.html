  <body><p id="filepos1167853" class="calibre_20"><a href="index_split_081.html#filepos1151744"><span class="calibre4">[1]</span></a><span class="calibre4">打抽丰：利用各种关系去有钱人那里捞点好处，也叫“打秋风”。</span></p><p id="filepos1168058" class="calibre_20"><a href="index_split_081.html#filepos1152422"><span class="calibre4">[2]</span></a><span class="calibre4">尖儿：最好的一部分。</span></p><p id="filepos1168206" class="calibre_20"><a href="index_split_081.html#filepos1159768"><span class="calibre4">[3]</span></a><span class="calibre4">歇马凉亭：古时驿路边供路人休息的亭子。</span></p><p id="filepos1168381" class="calibre_20"><a href="index_split_081.html#filepos1160619"><span class="calibre4">[4]</span></a><span class="calibre4">走了水：失火。古时因直言某灾不吉利，常以反语作委婉表达。</span></p><p id="filepos1168583" class="calibre_20"><a href="index_split_081.html#filepos1164306"><span class="calibre4">[5]</span></a><span class="calibre4">疏头：僧道拜忏所焚化的祝文，此处指修庙募捐的启示。</span></p><p id="filepos1168776" class="calibre_20"><a href="index_split_081.html#filepos1164422"><span class="calibre4">[6]</span></a><span class="calibre4">香头：寺、庙中管理香火的头目。</span></p><div class="mbp_pagebreak" id="calibre_pb_82"/>
