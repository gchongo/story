  <body><p id="filepos1251442" class="calibre_20"><a href="index_split_089.html#filepos1228752"><span class="calibre4">[1]</span></a><span class="calibre4">祟书本子：讲论鬼神星命、吉凶祸福的书。下文《玉匣记》即是。</span><br class="calibre2"/></p><p id="filepos1251656" class="calibre_20"><a href="index_split_089.html#filepos1230201"><span class="calibre4">[2]</span></a><span class="calibre4">七月初七日：即七夕，又叫乞巧节。旧俗认为，女孩生在这天会命运不好，婚姻欠佳。</span></p><p id="filepos1251888" class="calibre_20"><a href="index_split_089.html#filepos1232835"><span class="calibre4">[3]</span></a><span class="calibre4">豇（jiāng）豆：俗称角豆、姜豆。</span></p><p id="filepos1252051" class="calibre_20"><a href="index_split_089.html#filepos1234178"><span class="calibre4">[4]</span></a><span class="calibre4">雁翅：雁群飞行时，排列有序。此处指站立、排列整齐。</span></p><div class="mbp_pagebreak" id="calibre_pb_90"/>
