  <body><p id="filepos1827861" class="calibre_20"><a href="index_split_128.html#filepos1791658"><span class="calibre4">[1]</span></a><span class="calibre4">蠢：呛、顶撞之意。</span></p><p id="filepos1828006" class="calibre_20"><a href="index_split_128.html#filepos1800139"><span class="calibre4">[2]</span></a><span class="calibre4">侑（yòu）酒：劝酒，为饮酒者助兴。</span></p><p id="filepos1828173" class="calibre_20"><a href="index_split_128.html#filepos1813263"><span class="calibre4">[3]</span></a><span class="calibre4">“纵有千年”二句：出自南宋范成大诗《重九日行营寿之地》。铁门槛，喻意永保富贵。土馒头，即坟包。下文“畸人”语出《庄子》，意指不与世俗相合的人，即世外之人，与“槛外人”大概同义。</span></p><p id="filepos1828555" class="calibre_20"><a href="index_split_128.html#filepos1822911"><span class="calibre4">[4]</span></a><span class="calibre4">稽颡（qǐ sǎng）泣血：以头叩地，哀痛号泣。颡，额头。</span></p><div class="mbp_pagebreak" id="calibre_pb_129"/>
