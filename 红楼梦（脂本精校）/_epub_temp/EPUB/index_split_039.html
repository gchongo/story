  <body><p id="filepos501802" class="calibre_20"><a href="index_split_038.html#filepos472038"><span class="calibre4">[1]</span></a><span class="calibre4">夯（bèn）：同“笨”。</span></p><p id="filepos501951" class="calibre_20"><a href="index_split_038.html#filepos474601"><span class="calibre4">[2]</span></a><span class="calibre4">马棚风：习以为常，不当一回事。</span></p><p id="filepos502114" class="calibre_20"><a href="index_split_038.html#filepos476288"><span class="calibre4">[3]</span></a><span class="calibre4">杌（wù）子：小凳子。</span></p><p id="filepos502262" class="calibre_20"><a href="index_split_038.html#filepos477323"><span class="calibre4">[4]</span></a><span class="calibre4">燥屎：歇后语“燥屎——干搁着”，指对所托之事不加理会，搁置未办。</span></p><p id="filepos502476" class="calibre_20"><a href="index_split_038.html#filepos477961"><span class="calibre4">[5]</span></a><span class="calibre4">内人：双关语，即屋内人，古代泛指妻妾。</span></p><p id="filepos502651" class="calibre_20"><a href="index_split_038.html#filepos480114"><span class="calibre4">[6]</span></a><span class="calibre4">椒房：指后妃。</span></p><p id="filepos502790" class="calibre_20"><a href="index_split_038.html#filepos480530"><span class="calibre4">[7]</span></a><span class="calibre4">驻跸（bì）关防：驻跸，帝王后妃在宫外停留。关防，为帝、妃行宫采取的隔离措施。</span></p><p id="filepos503022" class="calibre_20"><a href="index_split_038.html#filepos485452"><span class="calibre4">[8]</span></a><span class="calibre4">坐纛（dào）旗儿：喻指主事的人。</span></p><p id="filepos503186" class="calibre_20"><a href="index_split_038.html#filepos490443"><span class="calibre4">[9]</span></a><span class="calibre4">移床易箦（zé）：指病人已到了垂危将死之时。</span></p><div class="mbp_pagebreak" id="calibre_pb_39"/>
