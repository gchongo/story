  <body><p id="filepos2150205" class="calibre_20"><a href="index_split_147.html#filepos2119417"><span class="calibre4">[1]</span></a><span class="calibre4">茶面子：以炒熟的面粉为主料，兑上开水即可食用的食品。</span></p><p id="filepos2150401" class="calibre_20"><a href="index_split_147.html#filepos2125146"><span class="calibre4">[2]</span></a><span class="calibre4">辐辏（còu）：车辐集中到车轮中心，喻家业兴盛，人丁兴旺。</span></p><p id="filepos2150601" class="calibre_20"><a href="index_split_147.html#filepos2126534"><span class="calibre4">[3]</span></a><span class="calibre4">行食：饭后活动以帮助消化。</span></p><p id="filepos2150758" class="calibre_20"><a href="index_split_147.html#filepos2130082"><span class="calibre4">[4]</span></a><span class="calibre4">鹄（gǔ）子：箭靶。</span></p><p id="filepos2150903" class="calibre_20"><a href="index_split_147.html#filepos2132775"><span class="calibre4">[5]</span></a><span class="calibre4">兔子：娈童、男妓。因兔子雌雄难辨，以此讥讽其不男不女、亦男亦女。</span></p><p id="filepos2151117" class="calibre_20"><a href="index_split_147.html#filepos2139036"><span class="calibre4">[6]</span></a><span class="calibre4">朔望之礼：每逢农历初一、十五的例常祭拜。朔日即初一，望日即十五。</span></p><div class="mbp_pagebreak" id="calibre_pb_148"/>
