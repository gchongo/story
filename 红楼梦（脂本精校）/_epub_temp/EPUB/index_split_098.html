  <body><p id="filepos1357531" class="calibre_20"><a href="index_split_097.html#filepos1335472"><span class="calibre4">[1]</span></a><span class="calibre4">车拔了缝：经过长期使用，车的部件之间出现了缝隙，叫作“拔了缝”。</span></p><p id="filepos1357745" class="calibre_20"><a href="index_split_097.html#filepos1337028"><span class="calibre4">[2]</span></a><span class="calibre4">人牙子：人贩子。</span></p><p id="filepos1357887" class="calibre_20"><a href="index_split_097.html#filepos1344023"><span class="calibre4">[3]</span></a><span class="calibre4">九国贩骆驼的：比喻爱管闲事、招揽钻营的人。</span></p><p id="filepos1358068" class="calibre_20"><a href="index_split_097.html#filepos1345094"><span class="calibre4">[4]</span></a><span class="calibre4">状元句：歇后语，状元痘即天花痘，天花痘疹发出灌浆饱满，即可转危为安，故称喜事，此处意在嘲讽。</span></p><p id="filepos1358324" class="calibre_20"><a href="index_split_097.html#filepos1347474"><span class="calibre4">[5]</span></a><span class="calibre4">【走僉】（qǐn）：方言用词，低头而目无旁顾。</span></p><div class="mbp_pagebreak" id="calibre_pb_98"/>
