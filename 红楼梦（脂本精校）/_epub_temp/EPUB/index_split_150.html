  <body><p id="filepos2180505" class="calibre_20"><a href="index_split_149.html#filepos2156577"><span class="calibre4">[1]</span></a><span class="calibre4">解释：此处意为劝解、安慰。</span></p><p id="filepos2180662" class="calibre_20"><a href="index_split_149.html#filepos2168860"><span class="calibre4">[2]</span></a><span class="calibre4">谖（xuān）：忘记，此处意为停止。</span></p><p id="filepos2180827" class="calibre_20"><a href="index_split_149.html#filepos2169483"><span class="calibre4">[3]</span></a><span class="calibre4">棔（hūn）：合欢树，又名夜合花。乔木，叶子入夜成对相合。</span></p><p id="filepos2181027" class="calibre_20"><a href="index_split_149.html#filepos2170352"><span class="calibre4">[4]</span></a><span class="calibre4">婺（wù）：婺女星，星宿名。</span></p><p id="filepos2181184" class="calibre_20"><a href="index_split_149.html#filepos2171071"><span class="calibre4">[5]</span></a><span class="calibre4">槎（chá）：木筏。</span></p><p id="filepos2181327" class="calibre_20"><a href="index_split_149.html#filepos2175918"><span class="calibre4">[6]</span></a><span class="calibre4">嫠（lí）妇：寡妇。</span></p><p id="filepos2181472" class="calibre_20"><a href="index_split_149.html#filepos2176499"><span class="calibre4">[7]</span></a><span class="calibre4">赑（bì）屃（xì）：传说中的龙生九子之一，像龟，以驮碑形象出现。此处代指石碑。</span></p><p id="filepos2181704" class="calibre_20"><a href="index_split_149.html#filepos2176594"><span class="calibre4">[8]</span></a><span class="calibre4">罘（fú）罳（sī）：古代设在宫门外或城角用于瞭望、防御的屏障，此处代指门外篱笆做成的围墙。</span></p><div class="mbp_pagebreak" id="calibre_pb_150"/>
