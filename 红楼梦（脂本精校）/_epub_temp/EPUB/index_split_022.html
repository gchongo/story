  <body><p id="filepos310401" class="calibre_20"><a href="index_split_021.html#filepos283594"><span class="calibre4">[1]</span></a><span class="calibre4">狼犺（kàng）：粗大、笨重。</span></p><p id="filepos310557" class="calibre_20"><a href="index_split_021.html#filepos287892"><span class="calibre4">[2]</span></a><span class="calibre4">鸭信：鸭舌头，此处指用酒糟腌制的卤味。</span></p><p id="filepos310732" class="calibre_20"><a href="index_split_021.html#filepos293288"><span class="calibre4">[3]</span></a><span class="calibre4">潗（qī）：意近“沏”。</span></p><p id="filepos310883" class="calibre_20"><a href="index_split_021.html#filepos293524"><span class="calibre4">[4]</span></a><span class="calibre4">乜（miē）斜：眯着眼睛，斜眼看人。</span></p><p id="filepos311050" class="calibre_20"><a href="index_split_021.html#filepos298899"><span class="calibre4">[5]</span></a><span class="calibre4">饧（xíng）涩：眼皮半开半合，眼色困顿黏滞的样子。</span></p><p id="filepos311239" class="calibre_20"><a href="index_split_021.html#filepos302958"><span class="calibre4">[6]</span></a><span class="calibre4">星戥（děng）：“戥”是一种称银子等贵重物品的小型秤。“星”指秤星，计量标志。</span></p><p class="calibre_30"><img src="images/00013.jpg" class="calibre_31"/></p><div class="mbp_pagebreak" id="calibre_pb_22"/>
