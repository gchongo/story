# aaPanel → 网站 → read.howhy.day → 配置文件
# 把下面内容加到 server { ... } 内（不要删掉 aaPanel 原有的 root / listen 等）
# 重要：该站点请关闭 PHP（纯静态站）

index index.html;

# favicon 避免走 PHP 导致 500
location = /favicon.ico {
    log_not_found off;
    access_log off;
    try_files /favicon.svg =204;
}

location = /favicon.svg {
    log_not_found off;
    access_log off;
    expires 7d;
}

# 章节 txt
location /content/ {
    alias /www/wwwroot/read.howhy.day/;
    charset utf-8;
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
}

# 静态资源
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location /data/ {
    expires 1h;
    add_header Cache-Control "public";
}

# SPA 路由（放在 location / 前或与伪静态一致）
location / {
    try_files $uri $uri/ /index.html;
}

# 禁止外网访问源码与 Git
location ~ ^/(site|\.git)(/|$) {
    deny all;
    return 404;
}

location ~ /\.(?!well-known) {
    deny all;
}
