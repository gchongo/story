# aaPanel / Nginx 配置模板
# aaPanel → 网站 → read.howhy.day → 配置文件
# 站点根目录: /www/wwwroot/read.howhy.day

# React Router 单页应用
location / {
    try_files $uri $uri/ /index.html;
}

# 章节原文 / 白话 txt（与站点同目录）
location /content/ {
    alias /www/wwwroot/read.howhy.day/;
    charset utf-8;
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
}

# 静态资源长缓存
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location /data/ {
    expires 1h;
    add_header Cache-Control "public";
}

# 禁止对外访问源码与 Git
location ~ ^/(site|\.git) {
    deny all;
    return 404;
}

# 禁止访问隐藏文件
location ~ /\. {
    deny all;
}
