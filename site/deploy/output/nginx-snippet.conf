# aaPanel / Nginx 配置模板
# 用法：aaPanel → 网站 → read.howhy.day → 配置文件
# 在 server { ... } 块内，用下方 location 替换或合并现有规则

# React Router 单页应用
location / {
    try_files $uri $uri/ /index.html;
}

# 章节原文 / 白话 txt（路径对应服务器上的 content 目录）
location /content/ {
    alias /www/wwwroot/story-content/;
    charset utf-8;
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
    add_header Access-Control-Allow-Origin "*";
}

# 静态资源长缓存
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location /data/ {
    expires 1h;
    add_header Cache-Control "public";
}

# 禁止访问隐藏文件
location ~ /\. {
    deny all;
}
